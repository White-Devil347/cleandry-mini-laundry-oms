services:
  - type: web
    name: cleandry-mini-oms
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_BASE_PATH
        value: /api
      - key: CORS_ORIGIN
        value: '*'
      - key: STORAGE_MODE
        value: memory
